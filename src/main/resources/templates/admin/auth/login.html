<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Đăng nhập admin - Partime Connect EPU')}"></head>
<body class="login-page">
<section class="login-section">
    <div class="container">
        <div class="login-box">
            <div class="row g-0">
                <div class="col-lg-6 d-none d-lg-block">
                    <div class="login-left">
                        <div class="login-brand">
                            <span class="brand-badge large">P</span>
                            <div>
                                <h3>Partime Connect EPU</h3>
                                <p>Quản lý nhà tuyển dụng, việc làm part-time và đơn ứng tuyển trên cùng một hệ thống.</p>
                            </div>
                        </div>

                        <div class="login-feature-list">
                            <div class="feature-item">
                                <i class="bi bi-shop-window"></i>
                                <span>Quản lý nơi tuyển dụng</span>
                            </div>
                            <div class="feature-item">
                                <i class="bi bi-briefcase"></i>
                                <span>Quản lý job part-time</span>
                            </div>
                            <div class="feature-item">
                                <i class="bi bi-file-earmark-text"></i>
                                <span>Xem toàn bộ đơn ứng tuyển</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="login-right">
                        <div class="login-form-wrap">
                            <h2>Đăng nhập Admin</h2>
                            <p class="text-muted mb-4">Truy cập trang quản trị hệ thống</p>

                            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                            <form th:action="@{/admin/do-login}" method="post">
                                <div class="mb-3">
                                    <label class="form-label">Tên đăng nhập</label>
                                    <input type="text" name="username" class="form-control modern-input" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Mật khẩu</label>
                                    <input type="password" name="password" class="form-control modern-input" required>
                                </div>
                                <button class="btn btn-gradient w-100 btn-lg">Đăng nhập</button>
                            </form>

                            <div class="login-note mt-4">
                                <span>Tài khoản mặc định:</span>
                                <strong>admin / 123456</strong>
                            </div>

                            <a th:href="@{/}" class="back-link">
                                <i class="bi bi-arrow-left"></i> Quay lại trang chủ
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
