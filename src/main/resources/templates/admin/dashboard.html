<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard - Partime Connect EPU')}"></head>
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout(~{::content})}">
    <div th:fragment="content">
        <div class="row g-4">
            <div class="col-lg-3 col-md-6">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="bi bi-shop"></i></div>
                    <div>
                        <div class="stat-value" th:text="${totalEmployers}">0</div>
                        <div class="stat-label">Nhà tuyển dụng</div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="stat-card">
                    <div class="stat-icon indigo"><i class="bi bi-briefcase-fill"></i></div>
                    <div>
                        <div class="stat-value" th:text="${totalJobs}">0</div>
                        <div class="stat-label">Việc làm part-time</div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="stat-card">
                    <div class="stat-icon cyan"><i class="bi bi-file-earmark-text-fill"></i></div>
                    <div>
                        <div class="stat-value" th:text="${totalApplications}">0</div>
                        <div class="stat-label">Tổng đơn ứng tuyển</div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="stat-card">
                    <div class="stat-icon purple"><i class="bi bi-bell-fill"></i></div>
                    <div>
                        <div class="stat-value" th:text="${newApplications}">0</div>
                        <div class="stat-label">Đơn mới</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mt-1">
            <div class="col-lg-8">
                <div class="panel-card">
                    <div class="panel-header">
                        <h5>Việc làm mới nhất</h5>
                        <a th:href="@{/admin/jobs}" class="btn btn-soft btn-sm">Xem tất cả</a>
                    </div>
                    <div class="table-responsive">
                        <table class="table modern-table align-middle">
                            <thead>
                            <tr>
                                <th>Tiêu đề</th>
                                <th>Nhà tuyển dụng</th>
                                <th>Loại</th>
                                <th>Lương</th>
                                <th>Trạng thái</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="job : ${latestJobs}">
                                <td th:text="${job.title}">Tên job</td>
                                <td th:text="${job.employer.name}">Employer</td>
                                <td><span class="table-chip" th:text="${job.jobGroup}">THEO_CA</span></td>
                                <td th:text="${job.salaryAmount} + ' / ' + ${job.salaryUnit}">Lương</td>
                                <td><span class="status-badge success" th:text="${job.status}">OPEN</span></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="panel-card h-100">
                    <div class="panel-header">
                        <h5>Đơn ứng tuyển mới</h5>
                        <a th:href="@{/admin/applications}" class="btn btn-soft btn-sm">Xem tất cả</a>
                    </div>
                    <div class="application-mini-list">
                        <div class="mini-application-item" th:each="app : ${latestApplications}">
                            <div class="mini-avatar">
                                <i class="bi bi-person-fill"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div class="fw-semibold" th:text="${app.fullName}">Họ tên</div>
                                <div class="small text-muted" th:text="${app.job.title}">Tên job</div>
                            </div>
                            <a class="btn btn-soft btn-sm" th:href="@{'/admin/applications/' + ${app.id}}">
                                Xem
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
