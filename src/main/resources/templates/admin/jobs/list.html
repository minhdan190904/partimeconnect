<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Việc làm - Partime Connect EPU')}"></head>
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout(~{::content})}">
    <div th:fragment="content">
        <div class="page-card">
            <div class="page-card-header">
                <div>
                    <h4 class="mb-1">Quản lý việc làm part-time</h4>
                    <p class="text-muted mb-0">Thêm, sửa, xóa các tin tuyển làm thêm theo giờ, theo ca hoặc cố định</p>
                </div>
                <a class="btn btn-gradient" th:href="@{/admin/jobs/create}">
                    <i class="bi bi-plus-circle me-1"></i> Thêm job
                </a>
            </div>

            <div class="table-responsive">
                <table class="table modern-table align-middle">
                    <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Tiêu đề</th>
                        <th>Nhà tuyển dụng</th>
                        <th>Loại</th>
                        <th>Lương</th>
                        <th>Khu vực</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="job : ${jobs}">
                        <td>
                            <img th:src="${job.imageUrl != null ? job.imageUrl : '/images/default-job.jpg'}" class="table-thumb" alt="">
                        </td>
                        <td>
                            <div class="fw-semibold" th:text="${job.title}">Tên job</div>
                            <div class="small text-muted" th:text="${job.workingTimeText}">Thời gian</div>
                        </td>
                        <td th:text="${job.employer.name}">Employer</td>
                        <td><span class="table-chip" th:text="${job.jobGroup}">THEO_CA</span></td>
                        <td th:text="${job.salaryAmount} + ' / ' + ${job.salaryUnit}">Lương</td>
                        <td th:text="${job.district} + ', ' + ${job.province}">Khu vực</td>
                        <td><span class="status-badge success" th:text="${job.status}">OPEN</span></td>
                        <td class="text-end">
                            <div class="table-actions">
                                <a class="btn btn-soft btn-sm" th:href="@{'/admin/jobs/edit/' + ${job.id}}">Sửa</a>
                                <a class="btn btn-soft btn-sm" th:href="@{'/admin/applications?jobId=' + ${job.id}}">Đơn</a>
                                <a class="btn btn-soft-danger btn-sm"
                                   th:href="@{'/admin/jobs/delete/' + ${job.id}}"
                                   onclick="return confirm('Xóa công việc này?')">Xóa</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(jobs)}">
                        <td colspan="8">
                            <div class="empty-inline">Chưa có job nào</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
