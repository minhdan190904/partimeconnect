<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Đơn ứng tuyển - Partime Connect EPU')}"></head>
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout(~{::content})}">
    <div th:fragment="content">
        <div class="page-card">
            <div class="page-card-header">
                <div>
                    <h4 class="mb-1">Danh sách đơn ứng tuyển</h4>
                    <p class="text-muted mb-0">Toàn bộ đơn mà ứng viên đã gửi vào hệ thống</p>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table modern-table align-middle">
                    <thead>
                    <tr>
                        <th>Ứng viên</th>
                        <th>Công việc</th>
                        <th>Điện thoại</th>
                        <th>Email</th>
                        <th>Thời gian làm</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="app : ${applications}">
                        <td>
                            <div class="fw-semibold" th:text="${app.fullName}">Họ tên</div>
                            <div class="small text-muted" th:text="${app.schoolName}">Trường</div>
                        </td>
                        <td th:text="${app.job.title}">Tên job</td>
                        <td th:text="${app.phone}">SĐT</td>
                        <td th:text="${app.email}">Email</td>
                        <td th:text="${app.availableTime}">Ca tối</td>
                        <td><span class="status-badge warning" th:text="${app.status}">NEW</span></td>
                        <td class="text-end">
                            <a class="btn btn-soft btn-sm" th:href="@{'/admin/applications/' + ${app.id}}">Xem chi tiết</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(applications)}">
                        <td colspan="7">
                            <div class="empty-inline">Chưa có đơn ứng tuyển nào</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
