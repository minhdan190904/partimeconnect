<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nhà tuyển dụng - Partime Connect EPU')}"></head>
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout(~{::content})}">
    <div th:fragment="content">
        <div class="page-card">
            <div class="page-card-header">
                <div>
                    <h4 class="mb-1">Quản lý nhà tuyển dụng</h4>
                    <p class="text-muted mb-0">Danh sách các cửa hàng, quán, địa điểm đang tuyển làm thêm</p>
                </div>
                <a class="btn btn-gradient" th:href="@{/admin/employers/create}">
                    <i class="bi bi-plus-circle me-1"></i> Thêm nhà tuyển dụng
                </a>
            </div>

            <div class="table-responsive">
                <table class="table modern-table align-middle">
                    <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Tên</th>
                        <th>Người liên hệ</th>
                        <th>Điện thoại</th>
                        <th>Địa chỉ</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="employer : ${employers}">
                        <td>
                            <img th:src="${employer.imageUrl != null ? employer.imageUrl : '/images/default-employer.jpg'}" class="table-thumb" alt="">
                        </td>
                        <td>
                            <div class="fw-semibold" th:text="${employer.name}">Tên</div>
                            <div class="small text-muted" th:text="${employer.email}">email</div>
                        </td>
                        <td th:text="${employer.contactPerson}">Người liên hệ</td>
                        <td th:text="${employer.phone}">SĐT</td>
                        <td th:text="${employer.address}">Địa chỉ</td>
                        <td><span class="status-badge success" th:text="${employer.status}">ACTIVE</span></td>
                        <td class="text-end">
                            <div class="table-actions">
                                <a class="btn btn-soft btn-sm" th:href="@{'/admin/employers/edit/' + ${employer.id}}">Sửa</a>
                                <a class="btn btn-soft-danger btn-sm"
                                   th:href="@{'/admin/employers/delete/' + ${employer.id}}"
                                   onclick="return confirm('Xóa nhà tuyển dụng này?')">Xóa</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employers)}">
                        <td colspan="7">
                            <div class="empty-inline">Chưa có nhà tuyển dụng nào</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
