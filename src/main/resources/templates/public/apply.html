<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Ứng tuyển - Partime Connect EPU')}"></head>
<body>
<div th:replace="~{fragments/public-header :: publicHeader}"></div>

<section class="section-block pt-4">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="apply-job-card">
                    <img th:src="${job.imageUrl != null ? job.imageUrl : '/images/default-job.jpg'}" class="apply-job-image" alt="">
                    <div class="p-4">
                        <span class="chip primary-chip" th:text="${job.jobGroup}">THEO_CA</span>
                        <h3 class="mt-3 mb-2" th:text="${job.title}">Tên việc làm</h3>
                        <div class="text-muted mb-3" th:text="${job.employer.name}">Tên nhà tuyển dụng</div>
                        <div class="apply-side-meta">
                            <div><i class="bi bi-cash-stack"></i> <span th:text="${job.salaryAmount} + ' / ' + ${job.salaryUnit}">Lương</span></div>
                            <div><i class="bi bi-clock"></i> <span th:text="${job.workingTimeText}">Thời gian</span></div>
                            <div><i class="bi bi-geo-alt"></i> <span th:text="${job.workAddress}">Địa chỉ</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="form-card">
                    <div class="form-card-header">
                        <h2>Gửi đơn ứng tuyển</h2>
                        <p>Điền đầy đủ thông tin để admin tiếp nhận và liên hệ với nơi tuyển dụng.</p>
                    </div>

                    <form th:action="@{/jobs/{id}/apply(id=${job.id})}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="jobId" th:value="${job.id}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" name="fullName" class="form-control modern-input" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" name="phone" class="form-control modern-input" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control modern-input">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Năm sinh</label>
                                <input type="number" name="birthYear" class="form-control modern-input">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Giới tính</label>
                                <select name="gender" class="form-select modern-input">
                                    <option value="">Chọn</option>
                                    <option value="Nam">Nam</option>
                                    <option value="Nữ">Nữ</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Trường học</label>
                                <input type="text" name="schoolName" class="form-control modern-input" placeholder="Ví dụ: Đại học Điện lực">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Chuyên ngành</label>
                                <input type="text" name="major" class="form-control modern-input">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Thời gian có thể làm</label>
                                <input type="text" name="availableTime" class="form-control modern-input" placeholder="Ví dụ: Ca tối, cuối tuần">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Kinh nghiệm</label>
                                <textarea name="experienceText" rows="4" class="form-control modern-input" placeholder="Mô tả ngắn kinh nghiệm đã từng làm..."></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Ghi chú thêm</label>
                                <textarea name="note" rows="3" class="form-control modern-input" placeholder="Ví dụ: Có thể bắt đầu làm từ tuần sau..."></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Upload CV</label>
                                <input type="file" name="cvFile" class="form-control modern-input">
                            </div>
                            <div class="col-12">
                                <button class="btn btn-gradient btn-lg px-4">
                                    <i class="bi bi-send-fill me-1"></i> Gửi đơn ứng tuyển
                                </button>
                                <a class="btn btn-light btn-lg px-4 ms-2" th:href="@{'/jobs/' + ${job.id}}">
                                    Quay lại
                                </a>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
